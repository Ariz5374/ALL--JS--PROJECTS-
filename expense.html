<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Expense Tracker (PKR)</title>
    <link rel="stylesheet" href="expense.css">
</head>

<body>
    <h1>Expense Tracker (PKR)</h1>

 <div class="summary">

    <div class="card">
        <h3>Total Balance</h3>
        <h2 id="balance">PKR 0</h2>
    </div>

    <div class="card">
        <h3>Total Income</h3>
        <h2 id="income">PKR 0</h2>
    </div>

    <div class="card">
        <h3>Total Expense</h3>
        <h2 id="expense">PKR 0</h2>
    </div>

</div>
<div class="main-content">

    <!-- Add Transaction -->

    <div class="form">

        <h2>Add Transaction</h2>

        <input
            type="text"
            id="name"
            placeholder="Enter transaction name">

        <input
            type="number"
            id="amount"
            placeholder="Enter amount in PKR">

        <select id="type">
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
        </select>

        <button id="addBtn">
            Add Transaction
        </button>

    </div>

    <!-- Transaction History -->

    <div class="history">

        <h2>Recent Transactions</h2>

        <ul id="transactionList"></ul>

    </div>

</div>
<div id="toast"></div>





        </div>
</body>

</html>

<script src="expense.js"></script>
