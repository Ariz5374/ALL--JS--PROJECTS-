<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="passwordStrength.css" />
  </head>
  <body>
    <div class="container">
      <h1><strong>Arcane Password Analyzer</strong></h1>
      <input type="password" placeholder="Enter your password" id="password" />
      <button id="showPassword">Show Password</button>
      <div class="Strength">
        <div id="strengthBar"></div>
      </div>
      <h2 id="StrengthText">Password Strength: None</h2>
      <h3>Requirements:</h3>
      <ul>
        <li id="length">✧ At least 8 characters</li>
        <li id="uppercase">✧ Contains uppercase letters</li>
        <li id="lowercase">✧ Contains lowercase letters</li>
        <li id="number">✧ Includes at least one number</li>
        <li id="special">✧ Has at least one special character</li
        
      </ul>
    </div>
  </body>
</html>
<script src="PasswordStrength.js"></script>
